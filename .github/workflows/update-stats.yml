name: Export Stats to Website

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Export stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/export-stats.js

      - name: Commit stats.json
        run: |
          git config user.name "MarketLens Bot"
          git config user.email "bot@marketlens.io"
          git add website/data/stats.json
          git diff --staged --quiet || git commit -m "chore: update stats.json [skip ci]"
          git push
